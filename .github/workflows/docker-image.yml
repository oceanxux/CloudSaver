FROM node:18-alpine AS frontend-build
WORKDIR /build/frontend
COPY frontend/package*.json ./
# 【修改 1】前端依赖安装
RUN npm install
COPY frontend/ ./
RUN npm run build

FROM node:18-alpine AS backend-build
WORKDIR /build/backend
COPY backend/package*.json ./
# 【修改 2】后端依赖安装
RUN npm install
COPY backend/ ./
RUN npm run build

FROM node:18-alpine

RUN apk add --no-cache nginx

WORKDIR /app

RUN mkdir -p /app/config /app/backend /usr/share/nginx/html

COPY --from=frontend-build /build/frontend/dist /usr/share/nginx/html
COPY --from=backend-build /build/backend/dist /app/backend/dist
COPY --from=backend-build /build/backend/package*.json /app/backend/
COPY --from=backend-build /build/backend/.env.example /app/backend/.env.example
COPY nginx.conf /etc/nginx/nginx.conf
COPY docker-entrypoint.sh /app/docker-entrypoint.sh

# 【修改 3】生产环境后端依赖安装（仅安装 prod 依赖）
RUN chmod +x /app/docker-entrypoint.sh \
  && npm --prefix /app/backend install --omit=dev

VOLUME ["/app/config"]

EXPOSE 8008

ENTRYPOINT ["/app/docker-entrypoint.sh"]
          password: ${{ secrets.GITHUB_TOKEN }} # 使用内置 Token，零配置

      - name: 设置 QEMU 支持多架构
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64 # 构建 x86_64 和 ARM64 双架构
          push: true
          tags: |
            ghcr.io/${{ env.LOWER_NAME }}:latest
            ghcr.io/${{ env.LOWER_NAME }}:${{ env.VERSION }}
